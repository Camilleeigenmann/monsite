{% extends 'monapp/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'monapp/liste_programmes.css' %}">
{% endblock %}

{% block content %}
    <h1>Voici la liste des programmes d'entraînement</h1>
    {% for programme in programmes %}
    <div class="programme"><a href="{% url 'programme-détails' programme.id %}" >{{programme.titre}}</a></div>
    {% endfor %}
{% endblock %}

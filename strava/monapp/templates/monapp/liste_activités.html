{% extends 'monapp/base.html' %}
{% load static %}
{% block extra_css %}
   <link rel="stylesheet" href="{% static 'monapp/liste_activités.css' %}">
{% endblock %}

{% block content %}
<h1>Voici les activités de {{utilisateur.prénom}} {{utilisateur.nom}}</h1>
{% for activité in activités %}
<div><a href="{% url 'activité-détails'  activité.id %}">Activité du {{activité.date}}</a></div>
{% endfor %}
<footer><a href="{% url 'ajouter-activité' utilisateur.id %}">Ajouter une activité </a></footer>
{% endblock %}
